<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancreatic Tumor Detection</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Poppins", sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .container {
            width: 550px;
            background: white;
            padding: 35px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        p {
            color: #444;
            font-size: 15px;
        }

        #upload-area {
            margin-top: 25px;
            padding: 35px;
            border: 2px dashed #007bff;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            background: #eef6ff;
        }

        #upload-area:hover {
            background: #dfeeff;
        }

        #preview-img {
            width: 100%;
            margin-top: 20px;
            display: none;
            border-radius: 12px;
        }

        .btn {
            margin-top: 25px;
            background: #007bff;
            padding: 12px 22px;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
            width: 80%;
        }

        .btn:hover {
            background: #0056d2;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Pancreatic Tumor Detection</h1>
    <p>Upload a CT scan image to predict whether it contains a pancreatic tumor.</p>

    <!-- Upload Box -->
    <div id="upload-area" onclick="document.getElementById('image-input').click();">
        <p><b>Click to upload</b> or drag an image here</p>
    </div>

    <!-- Hidden File Input -->
    <form id="upload-form" action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" id="image-input" accept="image/*" onchange="showPreview(event)">
        
        <!-- Preview Image -->
        <img id="preview-img" />

        <!-- Submit Button -->
        <button type="submit" class="btn" id="predict-btn" style="display:none;">
            Predict Tumor
        </button>
    </form>
</div>


<script>
// Show image preview and enable button
function showPreview(event) {
    let file = event.target.files[0];
    let preview = document.getElementById("preview-img");
    let btn = document.getElementById("predict-btn");

    if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
        btn.style.display = "block";
    }
}
</script>

</body>
</html>
